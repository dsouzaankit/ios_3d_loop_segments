# Builds iOS on GitHub-hosted macOS (no local Mac).
# - push / PR: simulator smoke build (no secrets)
# - workflow_dispatch: device IPA artifact (unsigned, or signed if Apple ID secrets set)

name: ios-build

on:
  workflow_dispatch:
  push:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-simulator:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode (latest on macOS 26 runner)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: ios
        run: xcodegen generate

      - name: Verify Xcode project lists KeepAlive MP3
        working-directory: ios
        run: |
          set -euo pipefail
          grep -q 'KeepAlive_silence.mp3' LoopSegments.xcodeproj/project.pbxproj
          echo "OK: KeepAlive_silence.mp3 in Xcode project"

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -project LoopSegments.xcodeproj \
            -scheme LoopSegments \
            -resolvePackageDependencies

      - name: Build (simulator, unsigned smoke test)
        working-directory: ios
        run: |
          xcodebuild -project LoopSegments.xcodeproj \
            -scheme LoopSegments \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build CODE_SIGNING_ALLOWED=NO

      - name: Verify KeepAlive_silence.mp3 in app bundle
        working-directory: ios
        run: |
          set -euo pipefail
          APP="$(find ~/Library/Developer/Xcode/DerivedData -path '*/Build/Products/*-iphonesimulator/LoopSegments.app' -type d 2>/dev/null | head -1)"
          if [[ -z "$APP" ]]; then
            APP="$(find build/DerivedData -path '*/Build/Products/*-iphonesimulator/LoopSegments.app' -type d 2>/dev/null | head -1)"
          fi
          if [[ -z "$APP" ]]; then
            echo "LoopSegments.app not found — skipping KeepAlive bundle check"
            exit 0
          fi
          FOUND="$(find "$APP" -name 'KeepAlive_silence.mp3' -print | head -1)"
          if [[ -z "$FOUND" ]]; then
            echo "ERROR: KeepAlive_silence.mp3 not in $APP (list bundle):"
            find "$APP" -maxdepth 3 -type f | head -40
            exit 1
          fi
          SIZE="$(stat -f%z "$FOUND" 2>/dev/null || stat -c%s "$FOUND")"
          echo "OK: $FOUND ($SIZE bytes)"
          if [[ "$SIZE" -lt 4096 ]]; then
            echo "ERROR: KeepAlive_silence.mp3 too small"
            exit 1
          fi

  build-ipa:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode (latest on macOS 26 runner)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: ios
        run: xcodegen generate

      - name: Verify Xcode project lists KeepAlive MP3
        working-directory: ios
        run: |
          set -euo pipefail
          grep -q 'KeepAlive_silence.mp3' LoopSegments.xcodeproj/project.pbxproj
          echo "OK: KeepAlive_silence.mp3 in Xcode project"

      - name: Resolve Swift packages
        working-directory: ios
        run: |
          xcodebuild -project LoopSegments.xcodeproj \
            -scheme LoopSegments \
            -resolvePackageDependencies

      - name: Build device IPA
        working-directory: ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          package_unsigned_ipa() {
            APP_PATH="$(find build/DerivedData -name 'LoopSegments.app' -type d | head -1)"
            if [[ -z "$APP_PATH" ]]; then
              echo "LoopSegments.app not found under build/DerivedData"
              find build/DerivedData -maxdepth 6 -type d -name '*.app' || true
              exit 1
            fi
            codesign --force --sign - --timestamp=none --deep "$APP_PATH"
            rm -rf Payload LoopSegments.ipa
            mkdir -p Payload
            cp -R "$APP_PATH" Payload/
            zip -yr LoopSegments.ipa Payload
            rm -rf Payload
          }

          verify_ipa_bundle_id() {
            local plist_path
            plist_path="$(find Payload -path '*/LoopSegments.app/Info.plist' | head -1)"
            if [[ -z "$plist_path" ]]; then
              unzip -q LoopSegments.ipa -d ipa-verify
              plist_path="$(find ipa-verify -path '*/LoopSegments.app/Info.plist' | head -1)"
            fi
            BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$plist_path")"
            EXECUTABLE="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$plist_path")"
            echo "CFBundleIdentifier=$BUNDLE_ID"
            echo "CFBundleExecutable=$EXECUTABLE"
            if [[ -z "$BUNDLE_ID" || "$BUNDLE_ID" == *'$'* ]]; then
              echo "ERROR: Missing CFBundleIdentifier in IPA (Sideloadly will fail)."
              exit 1
            fi
            if ! /usr/libexec/PlistBuddy -c 'Print :UIApplicationSceneManifest' "$plist_path" &>/dev/null; then
              echo "ERROR: Missing UIApplicationSceneManifest (app may crash on launch)."
              exit 1
            fi
            if [[ -d ipa-verify/Payload/LoopSegments.app/Frameworks ]] || [[ -d Payload/LoopSegments.app/Frameworks ]]; then
              echo "WARNING: FFmpeg Frameworks/ still present (may crash on iOS 26)."
            else
              echo "OK: no Frameworks/ embedded (iOS 26 launch-safe)."
            fi
            rm -rf ipa-verify
          }

          if [[ -n "${APPLE_ID:-}" ]]; then
            if [[ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "APPLE_ID is set; also set APPLE_APP_SPECIFIC_PASSWORD and APPLE_TEAM_ID,"
              echo "or remove APPLE_ID to build an unsigned IPA for Sideloadly."
              exit 1
            fi

            ARCHIVE_PATH="$RUNNER_TEMP/LoopSegments.xcarchive"
            EXPORT_PATH="$RUNNER_TEMP/ipa-export"

            xcodebuild -project LoopSegments.xcodeproj \
              -scheme LoopSegments \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -archivePath "$ARCHIVE_PATH" \
              archive \
              -allowProvisioningUpdates \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

            /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" ExportOptions-development.plist 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" ExportOptions-development.plist

            xcodebuild -exportArchive \
              -archivePath "$ARCHIVE_PATH" \
              -exportPath "$EXPORT_PATH" \
              -exportOptionsPlist ExportOptions-development.plist \
              -allowProvisioningUpdates

            cp "$EXPORT_PATH"/*.ipa LoopSegments.ipa
            unzip -q LoopSegments.ipa -d Payload
            verify_ipa_bundle_id
            KEEP="$(find Payload -name 'KeepAlive_silence.mp3' -print | head -1)"
            if [[ -z "$KEEP" ]]; then
              echo "ERROR: KeepAlive_silence.mp3 missing from signed IPA"
              exit 1
            fi
            echo "OK: KeepAlive in IPA at $KEEP"
          else
            echo "No APPLE_ID secret — building unsigned IPA (re-sign in Sideloadly)."
            xcodebuild -project LoopSegments.xcodeproj \
              -scheme LoopSegments \
              -destination 'generic/platform=iOS' \
              -configuration Release \
              -derivedDataPath build/DerivedData \
              build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY=- \
              DEVELOPMENT_TEAM=

            package_unsigned_ipa
            unzip -q LoopSegments.ipa -d Payload
            verify_ipa_bundle_id
            KEEP="$(find Payload -name 'KeepAlive_silence.mp3' -print | head -1)"
            if [[ -z "$KEEP" ]]; then
              echo "ERROR: KeepAlive_silence.mp3 missing from IPA"
              find Payload -maxdepth 4 -type f | head -40
              exit 1
            fi
            echo "OK: KeepAlive in IPA at $KEEP"
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v5
        with:
          name: LoopSegments-ipa
          path: ios/LoopSegments.ipa
          if-no-files-found: error
