# Smoke-build Loop Segments FFmpeg (kewlbear/FFmpeg-iOS SPM) on macOS runner.

name: ios-ffmpeg-build

on:
  workflow_dispatch:
  push:
    paths:
      - 'ios-ffmpeg/**'
      - 'ios/LoopSegments/**'
      - '.github/workflows/ios-ffmpeg-build.yml'
  pull_request:
    paths:
      - 'ios-ffmpeg/**'
      - 'ios/LoopSegments/**'
      - '.github/workflows/ios-ffmpeg-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-simulator:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        working-directory: ios-ffmpeg
        run: xcodegen generate

      - name: Resolve Swift packages
        working-directory: ios-ffmpeg
        run: |
          xcodebuild -project LoopSegmentsFFmpeg.xcodeproj \
            -scheme LoopSegmentsFFmpeg \
            -resolvePackageDependencies

      - name: Build (simulator)
        working-directory: ios-ffmpeg
        run: |
          xcodebuild -project LoopSegmentsFFmpeg.xcodeproj \
            -scheme LoopSegmentsFFmpeg \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build CODE_SIGNING_ALLOWED=NO
