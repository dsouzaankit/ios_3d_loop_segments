# XcodeGen — run from ios-ffmpeg/: xcodegen generate
# Experimental FFmpeg export (separate app from ios/ AVFoundation build).
name: LoopSegmentsFFmpeg
options:
  bundleIdPrefix: com.loopsegments
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
# ffmpeg-kit (arthenica) retired Jan 2025 — use LGPL FFmpeg-iOS + fftools, not ffmpeg-kit wrappers.
packages:
  FFmpeg-iOS:
    url: https://github.com/kewlbear/FFmpeg-iOS.git
    from: "0.0.6-b"
targets:
  LoopSegmentsFFmpeg:
    type: application
    platform: iOS
    sources:
      - path: LoopSegmentsFFmpeg
      - path: ../ios/LoopSegments
        excludes:
          - App/LoopSegmentsApp.swift
          - App/AppSession.swift
          - Features/Export/ExportView.swift
          - Services/ExportCoordinator.swift
          - Services/ExportPaths.swift
          - Services/Export
      - path: ../ios/LoopSegments/Services/Export/ExportLogWriter.swift
      - path: ../ios/LoopSegments/Services/Export/PhotosSegmentPublisher.swift
      - path: ../ios/LoopSegments/Services/Export/SegmentCleanup.swift
      - path: ../ios/LoopSegments/Services/Export/WebDAVMediaSession.swift
    dependencies:
      - package: FFmpeg-iOS
        product: FFmpeg-iOS
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: LoopSegmentsFFmpeg/Resources/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopsegments.ffmpeg
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
