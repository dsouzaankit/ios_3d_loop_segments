<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>REST logs</title>
    <style>
      body {
        font: 12px/1.4 Consolas, monospace;
        margin: 10px;
        min-width: 420px;
        max-width: 640px;
        background: #111;
        color: #ddd;
      }
      h1 { font-size: 14px; margin: 0 0 8px; color: #fff; }
      .meta { color: #888; margin-bottom: 8px; }
      .ok { color: #6c6; }
      .err { color: #f66; }
      .entry {
        border-top: 1px solid #333;
        padding: 8px 0;
        white-space: pre-wrap;
        word-break: break-all;
      }
      button {
        margin-right: 6px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h1>pCloud → Loop Segments REST</h1>
    <div class="meta" id="meta">Loading…</div>
    <button id="refresh">Refresh</button>
    <button id="clear">Clear</button>
    <div id="list"></div>
    <script src="logs.js"></script>
  </body>
</html>
