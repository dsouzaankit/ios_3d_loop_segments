# XcodeGen spec — run: xcodegen generate (from ios/)
name: LoopSegments
options:
  bundleIdPrefix: com.loopsegments
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
# FFmpeg-Kit removed from link step — embedded binaries crashed on launch on iOS 26.x.
# Export: AVFoundation on device (no ffmpeg SPM — ffmpeg-kit crashes on iOS 26).
targets:
  LoopSegments:
    type: application
    platform: iOS
    sources:
      - path: LoopSegments
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: LoopSegments/Resources/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopsegments.app
        MARKETING_VERSION: "1.2.6"
        CURRENT_PROJECT_VERSION: "110"
        TARGETED_DEVICE_FAMILY: "1,2"
