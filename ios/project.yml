# XcodeGen spec — run: xcodegen generate (from ios/)
name: LoopSegments
options:
  bundleIdPrefix: com.loopsegments
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
packages:
  ffmpeg-kit-spm:
    url: https://github.com/tylerjonesio/ffmpeg-kit-spm
    from: 5.1.0
targets:
  LoopSegments:
    type: application
    platform: iOS
    sources:
      - path: LoopSegments
    settings:
      base:
        INFOPLIST_FILE: LoopSegments/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.loopsegments.app
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: ffmpeg-kit-spm
        product: FFmpeg-Kit
