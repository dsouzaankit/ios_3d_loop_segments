# XcodeGen spec — run: xcodegen generate (from ios/)
name: LoopSegments
options:
  bundleIdPrefix: com.loopsegments
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
# Export: AVFoundation on device (no embedded ffmpeg).
targets:
  LoopSegments:
    type: application
    platform: iOS
    sources:
      - path: LoopSegments
        excludes:
          - Resources
      - path: LoopSegments/Resources/KeepAlive_silence.mp3
        buildPhase: resources
      - path: LoopSegments/Resources/KeepAlive_silence-credits.txt
        buildPhase: resources
      - path: LoopSegments/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    preBuildScripts:
      - name: Copy KeepAlive silence into app bundle
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          RES="${SRCROOT}/LoopSegments/Resources"
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "$DEST"
          cp "${RES}/KeepAlive_silence.mp3" "${DEST}/"
          cp "${RES}/KeepAlive_silence-credits.txt" "${DEST}/"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: LoopSegments/Resources/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.loopsegments.app
        MARKETING_VERSION: "1.2.41"
        CURRENT_PROJECT_VERSION: "277"
        TARGETED_DEVICE_FAMILY: "1,2"
